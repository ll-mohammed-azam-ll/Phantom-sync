<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Sync | Venta Corp</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --obsidian: #0a0a0b;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--obsidian);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Luxury Header */
        header {
            padding: 20px;
            border-bottom: 1px solid var(--gold);
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1c, var(--obsidian));
        }

        h1 {
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Vault ID Section */
        .vault-info {
            padding: 15px;
            background: var(--glass);
            margin: 10px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            text-align: center;
        }

        #my-id {
            color: var(--gold);
            font-weight: bold;
            display: block;
            margin-top: 5px;
            word-break: break-all;
        }

        /* Contact & Connection Area */
        .sync-controls {
            padding: 10px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #151517;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--gold); }

        button {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        /* Chat Window */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
            backdrop-filter: blur(5px);
        }

        .received {
            align-self: flex-start;
            background: var(--glass);
            border-left: 3px solid var(--gold);
        }

        .sent {
            align-self: flex-end;
            background: rgba(212, 175, 55, 0.1);
            border-right: 3px solid var(--gold);
            text-align: right;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #121214;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

<header>
    <h1>Phantom Sync</h1>
</header>

<div class="vault-info">
    <small>YOUR VAULT KEY</small>
    <span id="my-id">Initializing Neural Link...</span>
</div>

<div class="sync-controls">
    <input type="text" id="peer-id-input" placeholder="Enter Peer Vault Key">
    <button onclick="connectToPeer()">SYNC</button>
</div>

<div id="chat-container">
    <div class="message received">System: Waiting for peer synchronization...</div>
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Type a secure message...">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
    // --- PHANTOM SYNC CORE ENGINE ---
const myIdDisplay = document.getElementById('my-id');
const chatContainer = document.getElementById('chat-container');
const peerIdInput = document.getElementById('peer-id-input');
const msgInput = document.getElementById('msg-input');

let peer;
let conn;

// 1. Initialize Peer with reliable configuration
// We use a public STUN server to help bypass mobile firewalls
peer = new Peer(null, {
    debug: 2,
    config: {
        'iceServers': [
            { url: 'stun:stun.l.google.com:19302' },
            { url: 'stun:stun1.l.google.com:19302' }
        ]
    }
});

// Display your Vault Key once it's generated
peer.on('open', (id) => {
    myIdDisplay.innerText = id;
    appendMessage("System", "Neural Link Online. Ready for Sync.", "received");
});

// 2. RECEIVER SIDE: Handle incoming "Sync" requests
peer.on('connection', (connection) => {
    // If we are already connected, close the old one to avoid memory leaks
    if (conn) conn.close();
    
    conn = connection;
    setupConnectionListeners();
    appendMessage("System", "Incoming Sync Request Detected...", "received");
});

// 3. SENDER SIDE: Initiate "Sync"
function connectToPeer() {
    const remoteId = peerIdInput.value.trim();
    if (!remoteId) {
        alert("Please enter a Vault Key.");
        return;
    }

    appendMessage("System", `Attempting Tunnel to ${remoteId}...`, "received");
    
    // Connect to the remote peer
    conn = peer.connect(remoteId, {
        reliable: true // Ensures data arrives in order
    });
    
    setupConnectionListeners();
}

// 4. THE TUNNEL LOGIC: Handling data and states
function setupConnectionListeners() {
    conn.on('open', () => {
        appendMessage("System", "P2P Tunnel Secure. Data Syncing Active.", "received");
        
        // Listen for data (Messages or Ledger Updates)
        conn.on('data', (data) => {
            // Check if it's a string (chat) or an object (ledger update)
            if (typeof data === 'string') {
                appendMessage("Peer", data, "received");
            } else {
                handleLedgerUpdate(data);
            }
        });
    });

    conn.on('close', () => {
        appendMessage("System", "Sync Lost. Tunnel Collapsed.", "received");
        conn = null;
    });

    conn.on('error', (err) => {
        console.error("Connection Error:", err);
        appendMessage("System", "Encryption Mismatch or Timeout.", "received");
    });
}

// 5. DATA TRANSMISSION
function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg) return;

    if (conn && conn.open) {
        conn.send(msg); // Send the actual data through the P2P tunnel
        appendMessage("You", msg, "sent");
        msgInput.value = "";
    } else {
        appendMessage("System", "Error: No Active Tunnel.", "received");
    }
}

// 6. UI HELPER
function appendMessage(sender, text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = `<small style="color:var(--gold)">${sender}</small><br>${text}`;
    chatContainer.appendChild(div);
    
    // Smooth scroll for mobile
    chatContainer.scrollTo({
        top: chatContainer.scrollHeight,
        behavior: 'smooth'
    });
}

// Allow "Enter" key to send messages
msgInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
